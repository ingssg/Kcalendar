<!-- Base -->
<div class="flex flex-col gap-1 items-start">
<span class="font-label text-[0.6875rem] tracking-widest uppercase text-on-surface-variant font-medium">기준</span>
<div class="flex items-baseline gap-1">
<span class="font-headline text-3xl font-bold text-on-surface">2,100</span>
<span class="font-label text-[0.6875rem] text-on-surface-variant">kcal</span>
</div>
</div>
<!-- Intake -->
<div class="flex flex-col gap-1 items-start pl-4 border-l border-surface-variant/20">
<span class="font-label text-[0.6875rem] tracking-widest uppercase text-on-surface-variant font-medium">섭취</span>
<div class="flex items-baseline gap-1">
<span class="font-headline text-3xl font-bold text-on-surface">2,150</span>
<span class="font-label text-[0.6875rem] text-on-surface-variant">kcal</span>
</div>
</div>
<!-- Difference -->

<span class="font-label text-[0.6875rem] tracking-widest uppercase text-on-surface-variant font-medium">기준 대비</span>
<div class="flex items-baseline gap-1">
<span class="font-headline text-3xl font-bold text-tertiary">+50</span>
<span class="font-label text-[0.6875rem] text-on-surface-variant">kcal</span>
</div>
</div>
</div>
</div>
</section>
<!-- Food Item List (Read-only) -->
<section class="flex flex-col gap-4">
<h2 class="font-headline text-on-surface-variant text-sm tracking-wide">섭취 항목</h2>

<!-- Item 1 -->

</div>
