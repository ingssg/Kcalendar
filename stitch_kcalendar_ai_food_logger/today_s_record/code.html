<body class="bg-surface text-on-surface min-h-screen flex flex-col pt-[72px] pb-[90px]">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#f8f9fa]/80 backdrop-blur-md dark:bg-[#1A1A1A]/80 bg-[#f3f4f5] dark:bg-[#2a2a2a]">

</button>
<h1 class="font-['Manrope'] font-extrabold tracking-tighter text-[#1A1A1A] dark:text-[#f8f9fa] text-lg">Kcalendar</h1>
<div class="w-10"></div> <!-- Spacer for alignment -->
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow w-full max-w-md mx-auto px-6 py-8 flex flex-col gap-8">
<!-- Date Header Section -->
<section class="flex flex-col gap-2">
<h2 class="font-headline text-3xl font-bold tracking-tight text-on-surface">4월 18일 (금)</h2>
</section>
<!-- Calorie Summary Bento Box -->
<section class="rounded-xl p-6 flex flex-col gap-6 relative shadow-[0_12px_32px_rgba(25,28,29,0.04)]" style="background-color: rgba(27,109,36,0.05);">
<div class="grid grid-cols-3 gap-4">
<!-- Base -->
<div class="flex flex-col gap-1 items-start">
<span class="font-label text-[0.6875rem] tracking-widest uppercase text-on-surface-variant font-medium">기준</span>
<div class="flex items-baseline gap-1">
<span class="font-headline text-3xl font-bold text-on-surface">2,100</span>
<span class="font-label text-[0.6875rem] text-on-surface-variant">kcal</span>
</div>
</div>
<!-- Intake -->
<div class="flex flex-col gap-1 items-start pl-4 border-l border-surface-variant/20">
<span class="font-label text-[0.6875rem] tracking-widest uppercase text-on-surface-variant font-medium">섭취</span>
<div class="flex items-baseline gap-1">
<span class="font-headline text-3xl font-bold text-on-surface">1,800</span>
<span class="font-label text-[0.6875rem] text-on-surface-variant">kcal</span>
</div>
</div>
<!-- Difference -->
<div class="flex flex-col gap-1 items-start pl-4 border-l border-surface-variant/20">
<span class="font-label text-[0.6875rem] tracking-widest uppercase text-on-surface-variant font-medium">기준 대비</span>
<div class="flex items-baseline gap-1">
<span class="font-headline text-3xl font-bold text-secondary">-300</span>
<span class="font-label text-[0.6875rem] text-on-surface-variant">kcal</span>
</div>
</div>
</div>
<!-- 섭취 프로그레스 바 -->
<div class="flex flex-col gap-1.5">
<div class="w-full h-1.5 bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full rounded-full bg-secondary" style="width: 85.7%"></div>
</div>
<span class="font-label text-[0.6875rem] text-on-surface-variant">기준의 85.7% 섭취</span>
</div>
</section>
<!-- Input Area -->
<section class="flex flex-col gap-4 bg-surface-container-low p-6 rounded-xl">
<label class="font-label text-[0.6875rem] tracking-widest uppercase text-on-surface-variant font-medium" for="food-input">오늘 먹은 것을 입력하세요</label>
<textarea class="w-full bg-surface-container-low border-0 focus:ring-0 focus:bg-surface-container-highest rounded-md p-4 font-body text-base text-on-surface placeholder-on-surface-variant/50 transition-colors resize-none" id="food-input" placeholder="바나나 2개, 제육덮밥, 콜라 1캔…" rows="3"></textarea>
<button class="bg-primary text-on-primary font-headline font-bold text-sm tracking-wide rounded-md py-4 px-6 mt-2 hover:bg-primary-container transition-colors shadow-[0_12px_32px_rgba(25,28,29,0.04)] flex justify-between items-center w-full">
<span>기록하기</span>
<span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
</section>
<!-- Food Item List -->
<section class="flex flex-col gap-6 mt-4">
<h3 class="font-headline text-xl font-bold text-on-surface tracking-tight">오늘의 기록</h3>
<div class="flex flex-col gap-4">
<!-- Item 1 -->
<div class="flex items-center justify-between py-4 bg-surface-container-lowest rounded-xl px-5 shadow-[0_12px_32px_rgba(25,28,29,0.04)]">
<div class="flex flex-col gap-1">
<span class="font-body text-base font-medium text-on-surface">Pork Rice Bowl</span>
<span class="font-label text-[0.6875rem] text-on-surface-variant tracking-wide">점심</span>
</div>
<div class="flex items-center gap-4">
<span class="font-headline text-xl font-bold text-on-surface">850 <span class="text-xs font-normal text-on-surface-variant ml-1">kcal</span></span>
<button class="text-on-surface-variant hover:text-on-surface transition-colors p-2 rounded-full hover:bg-surface-container-high">
<span class="material-symbols-outlined text-[20px]" data-icon="edit">edit</span>
</button>
</div>
</div>
<!-- Item 2 -->
<div class="flex items-center justify-between py-4 bg-surface-container-lowest rounded-xl px-5 shadow-[0_12px_32px_rgba(25,28,29,0.04)]">
<div class="flex flex-col gap-1">
<span class="font-body text-base font-medium text-on-surface">2 Bananas</span>
<span class="font-label text-[0.6875rem] text-on-surface-variant tracking-wide">간식</span>
</div>
<div class="flex items-center gap-4">
<span class="font-headline text-xl font-bold text-on-surface">210 <span class="text-xs font-normal text-on-surface-variant ml-1">kcal</span></span>
<button class="text-on-surface-variant hover:text-on-surface transition-colors p-2 rounded-full hover:bg-surface-container-high">
<span class="material-symbols-outlined text-[20px]" data-icon="edit">edit</span>
</button>
</div>
</div>
<!-- Item 3 -->
<div class="flex items-center justify-between py-4 bg-surface-container-lowest rounded-xl px-5 shadow-[0_12px_32px_rgba(25,28,29,0.04)]">
<div class="flex flex-col gap-1">
<span class="font-body text-base font-medium text-on-surface">"파란 음료 1잔"</span>
<span class="font-label text-[0.6875rem] text-on-surface-variant/50 font-medium tracking-wide">추정 불가</span>
</div>
<div class="flex items-center gap-4">
<span class="font-headline text-xl font-bold text-on-surface-variant opacity-30">-- <span class="text-xs font-normal ml-1">kcal</span></span>
<button class="text-on-surface-variant hover:text-on-surface transition-colors p-2 rounded-full hover:bg-surface-container-high">
<span class="material-symbols-outlined text-[20px]" data-icon="edit">edit</span>
</button>
</div>
</div>
</div>
</section>
